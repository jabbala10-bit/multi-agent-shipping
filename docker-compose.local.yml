services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: storefront
      MYSQL_USER: policymesh
      MYSQL_PASSWORD: policymesh
      MYSQL_ROOT_PASSWORD: policymesh-root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/inventory.sql:/docker-entrypoint-initdb.d/01-inventory.sql:ro
      - ./docs/shipping.sql:/docker-entrypoint-initdb.d/02-shipping.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
